<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .error {
      color: white;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <video id="videoPlayer" controls>
    Your browser does not support the video tag.
  </video>
  <p id="errorMessage" class="error"></p>

  <script>
    // Get the video URL from the query parameters
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('url'); // Parameter name: 'url'

    const videoPlayer = document.getElementById('videoPlayer');
    const errorMessage = document.getElementById('errorMessage');

    if (videoUrl) {
      videoPlayer.src = videoUrl;
    } else {
      errorMessage.textContent = "No video URL provided. Please pass a 'url' parameter in the query string.";
    }

    // Enable full-screen when clicking on the video
    videoPlayer.addEventListener('click', () => {
      if (videoPlayer.requestFullscreen) {
        videoPlayer.requestFullscreen();
      } else if (videoPlayer.webkitRequestFullscreen) { /* Safari */
        videoPlayer.webkitRequestFullscreen();
      } else if (videoPlayer.msRequestFullscreen) { /* IE11 */
        videoPlayer.msRequestFullscreen();
      }
    });
  </script>
</body>
</html>
